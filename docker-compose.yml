# v18.0 "The Singularity" Docker Compose orchestrator
services:
  aviation-core:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./src/models:/app/src/models
    environment:
      - PRODUCTION=true
      - ALLOWED_ORIGINS=http://localhost:8501,http://127.0.0.1:8501
    restart: unless-stopped
