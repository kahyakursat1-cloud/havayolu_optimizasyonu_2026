services:
  aviation-core:
    build: .
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ./logs:/app/logs
      - ./src/models:/app/src/models
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///aviation.db}
      API_KEY: ${API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      LIVE_SYNC_ENABLED: ${LIVE_SYNC_ENABLED:-0}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
