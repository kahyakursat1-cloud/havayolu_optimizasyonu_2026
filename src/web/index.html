<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Singularity | Ultimate v14.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #020617; color: #f8fafc;
            margin: 0; padding: 0;
            display: flex !important; height: 100vh; width: 100vw; overflow: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .hidden { display: none !important; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body style="display: flex !important; flex-direction: row !important; height: 100vh; width: 100vw; margin: 0; background: #020617;">

    <!-- Sidebar: Absolute Style -->
    <aside class="glass" style="display: flex !important; flex-direction: column !important; width: 280px !important; height: 100vh !important; flex-shrink: 0 !important; padding: 1.5rem !important; border-radius: 0 !important; border-top: none; border-bottom: none; border-left: none;">
        <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:2rem;">
            <div style="width:2.5rem; height:2.5rem; background:#0ea5e9; border-radius:0.5rem; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 10px rgba(14,165,233,0.4);">
                <i data-lucide="plane-takeoff" style="color:white; width:1.5rem; height:1.5rem;"></i>
            </div>
            <h1 class="orbitron neon-blue" style="font-size:1.1rem; font-weight:bold; margin:0;">SINGULARITY</h1>
        </div>
        <div id="agent-logs" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:0.75rem; padding-right:0.5rem;">
            <div style="padding:0.6rem; border-radius:0.5rem; background:rgba(16,185,129,0.05); border:1px solid rgba(16,185,129,0.1); font-size:0.65rem;">
                <span style="color:#10b981; font-weight:bold;">[SYSTEM]</span> v14.5 Hardcore Active.
            </div>
        </div>
        <div style="margin-top:auto; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; gap:0.5rem; font-size:0.6rem;">
            <div style="width:1.5rem; height:1.5rem; border-radius:50%; background:#1e293b; display:flex; align-items:center; justify-content:center;">
                <i data-lucide="user" style="width:0.8rem; height:0.8rem; color:#64748b;"></i>
            </div>
            <p style="margin:0;"><span style="font-weight:bold;">Admin</span> | v14.5 Master</p>
        </div>
    </aside>

    <main style="display: flex !important; flex-direction: column !important; flex-grow: 1 !important; height: 100vh !important; padding: 1.5rem !important; gap: 1.5rem !important; min-width: 0;">
        <div id="loading-overlay" class="hidden" style="position:absolute; inset:0; z-index:500; background:rgba(2,6,23,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem;">
            <div style="width:3rem; height:3rem; border:4px solid #0ea5e9; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
            <p class="orbitron neon-blue" style="font-size:0.7rem;">ULTIMATE OPTIMIZATION IN PROGRESS...</p>
        </div>

        <!-- Header: Absolute Side-by-Side -->
        <header style="display: flex !important; justify-content: space-between !important; align-items: flex-start !important; width: 100% !important;">
            <div style="display: flex !important; flex-grow: 1 !important; gap: 1rem !important; margin-right: 1.5rem !important;">
                <div class="glass" style="flex:1; padding:1rem; border-radius:0.75rem;">
                    <p style="color:#64748b; font-size:0.6rem; margin:0 0 0.2rem 0;">ECOSYSTEM</p>
                    <h2 class="orbitron" style="color:#10b981; margin:0; font-size:1.3rem;">99.9%</h2>
                </div>
                <div class="glass" style="flex:1; padding:1rem; border-radius:0.75rem;">
                    <p style="color:#64748b; font-size:0.6rem; margin:0 0 0.2rem 0;">CYBER RISK</p>
                    <h2 class="orbitron" style="color:#38bdf8; margin:0; font-size:1.3rem;">LOW</h2>
                </div>
                <div class="glass" style="flex:1; padding:1rem; border-radius:0.75rem;">
                    <p style="color:#64748b; font-size:0.6rem; margin:0 0 0.2rem 0;">ACR STATUS</p>
                    <h2 class="orbitron" style="color:#a855f7; margin:0; font-size:1.3rem;">100%</h2>
                </div>
                <div class="glass" style="flex:1; padding:1rem; border-radius:0.75rem;">
                    <p style="color:#64748b; font-size:0.6rem; margin:0 0 0.2rem 0;">RE-FUEL</p>
                    <h2 class="orbitron" style="color:#f59e0b; margin:0; font-size:1.3rem;">SAF-26</h2>
                </div>
            </div>
            <button onclick="runOptimize()" class="orbitron" style="padding:1rem 2rem; background:#0ea5e9; color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:bold; font-size:0.8rem; box-shadow: 0 5px 15px rgba(14,165,233,0.3); flex-shrink:0;">RE-OPTIMIZE</button>
        </header>

        <!-- Body: Absolute Side-by-Side Analytics -->
        <section style="display: flex !important; flex: 1 !important; gap: 1.5rem !important; min-height: 0 !important; width: 100% !important;">
            <div style="display: flex !important; flex-direction: column !important; width: 66% !important; gap: 1.5rem !important; height: 100% !important;">
                <div class="glass" style="flex: 2 !important; padding: 1rem; display: flex; flex-direction: column;">
                    <h3 class="orbitron" style="font-size:0.65rem; color:#64748b; margin:0 0 1rem 0; letter-spacing:0.1em;">3D TRAJECTORY DYNAMICS</h3>
                    <div style="flex: 1; min-height: 0;"><canvas id="trajectoryChart"></canvas></div>
                </div>
                <div class="glass" style="flex: 1 !important; padding: 1rem; display: flex; flex-direction: column;">
                    <h3 class="orbitron" style="font-size:0.65rem; color:#64748b; margin:0 0 0.5rem 0; letter-spacing:0.1em;">ANOMALY FEED</h3>
                    <div id="cyber-feed" style="flex:1; overflow-y:auto; font-size:0.65rem; color:#475569;">Scanning Network...</div>
                </div>
            </div>
            <div style="display: flex !important; flex-direction: column !important; width: 33% !important; gap: 1.5rem !important; height: 100% !important;">
                <div class="glass" style="height: 40%; padding: 1rem; display: flex; flex-direction: column;">
                    <h3 class="orbitron" style="font-size:0.65rem; color:#64748b; margin:0 0 1rem 0;">CAUSAL ANALYSIS</h3>
                    <div style="flex: 1; min-height: 0;"><canvas id="causalChart"></canvas></div>
                </div>
                <div class="glass" style="flex: 1; padding: 1rem; display: flex; flex-direction: column; overflow: hidden;">
                    <h3 class="orbitron" style="font-size:0.65rem; color:#64748b; margin:0 0 1rem 0;">LIVE FLEET</h3>
                    <div style="flex: 1; overflow-y: auto;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 0.65rem; color: #94a3b8;">
                            <tbody id="fleet-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js?v=14.5.1"></script>
</body>
</html>
