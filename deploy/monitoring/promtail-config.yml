server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: system
  static_configs:
  - targets:
      - localhost
    labels:
      job: aviation-logs
      __path__: /var/log/aviation/*.log

  pipeline_stages:
  - json:
      expressions:
        level: level
        logger: logger
        msg: msg
  - labels:
      level:
      logger:
